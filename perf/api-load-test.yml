## Monitoring and Observability

### Performance Headers

All API responses include:
- `X-Response-Time` - Response time in milliseconds
- `X-RateLimit-Limit` - Rate limit cap
- `X-RateLimit-Remaining` - Remaining requests
- `X-RateLimit-Reset` - Reset timestamp

### Sentry Integration

- Transaction tracking
- Performance breadcrumbs
- Slow request alerts (>1000ms)
- Database query monitoring (>500ms)

### Cache Statistics

Access via:
```typescript
import { getStats } from './cache';
const stats = getStats();
console.log(`Hit rate: ${stats.hitRate}%`);
```

## Troubleshooting

### Common Issues

1. **k6 not found**
   - Install k6 following the instructions above

2. **Server not running**
   - Ensure the server is started on port 3001
   - Check `BASE_URL` environment variable

3. **Rate limit test failures**
   - Expected behavior - tests verify rate limiting works
   - Check that 429 responses are returned

4. **Database connection errors**
   - Check DATABASE_URL in .env
   - Verify PostgreSQL is running

### Debug Mode

Run tests with verbose output:
```bash
k6 run --verbose perf/api-baseline-test.js
```

### Export Results

Export results to JSON:
```bash
k6 run --out json=results.json perf/api-load-test.js
```

