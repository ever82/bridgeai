id: TASK-001
issue_id: ISSUE-UI002
title: 实现全局导航与布局系统
description: |
  实现应用全局导航结构和布局系统，包括：
  1. 底部 Tab 导航（带徽章、动画）
  2. 导航结构与路由配置（深链接支持）
  3. 页面布局容器组件
  4. 侧边抽屉导航
  5. 导航状态与权限控制
  6. 响应式布局适配

acceptance_criteria:
  - c1: 底部 Tab 导航 - Home, Messages, Discover, Profile 四个 Tab，支持 badge 显示和切换动画
  - c2: 导航结构与路由配置 - 使用 React Navigation，Auth/Main 栈分离，TypeScript 类型定义，深链接配置
  - c3: 页面布局容器 - ScreenContainer, Header, LoadingSkeleton, EmptyState, ErrorState
  - c4: 侧边抽屉导航 - DrawerNavigator 组件，用户头像、菜单列表，支持手势滑动
  - c5: 导航状态与权限控制 - AuthGuard, useAuthNavigation hook，路由守卫
  - c6: 响应式布局适配 - useScreenDimensions hook，KeyboardAvoidingView 组件

