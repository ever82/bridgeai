id: TASK-001
issue_id: ISSUE-C006
title: 场景配置管理系统实现
description: |
  实现四大场景（VisionShare、AgentDate、AgentJob、AgentAd）的配置管理系统，包括：
  1. 场景配置 Schema 定义
  2. 场景字段定义和验证
  3. 场景模板系统
  4. 场景能力声明
  5. 场景切换和迁移
  6. 场景配置管理 UI

acceptance_criteria:
  - id: ISSUE-C006~c1
    name: 场景配置 Schema
    status: completed
    notes: |
      SceneConfig 类型已定义，四个场景配置在 packages/shared/src/config/scenes/ 中
      - VisionShare: 视觉分享场景配置
      - AgentDate: 约会场景配置
      - AgentJob: 求职场景配置
      - AgentAd: 广告场景配置
      每个场景都有完整的 metadata、fields、capabilities、templates、ui 配置
  - id: ISSUE-C006~c2
    name: 场景字段定义
    status: completed
    notes: |
      SceneFieldDefinition 已定义，包含：
      - 字段类型支持（text, textarea, number, boolean, select, multiselect, date, datetime, time, location, range, image, file, url, email, phone, tags）
      - 字段验证规则（required, min, max, minLength, maxLength, pattern, custom）
      - 字段依赖关系
      - 字段国际化支持
      - 字段 UI 配置
      创建了完整的 Zod 验证 Schema：packages/shared/src/schemas/sceneFields/index.ts
  - id: ISSUE-C006~c3
    name: 场景模板系统
    status: completed
    notes: |
      TemplateService 已实现，功能包括：
      - 创建模板
      - 获取模板
      - 更新模板
      - 删除模板
      - 应用模板到 Agent Profile
      - 复制模板
      - 设置默认模板
      - 分享模板
      - 搜索模板
      - 预设模板和用户自定义模板支持
  - id: ISSUE-C006~c4
    name: 场景能力声明
    status: completed
    notes: |
      SceneCapability 已定义，SceneCapabilityService 已实现，功能包括：
      - 检查能力是否启用
      - 获取已启用能力列表
      - 获取所有能力（包括禁用的）
      - 获取能力配置
      - 验证能力版本
      - 检查依赖是否满足
      - 检测循环依赖
      - 获取能力状态摘要
  - id: ISSUE-C006~c5
    name: 场景切换和迁移
    status: completed
    notes: |
      SceneMigrationService 已实现，功能包括：
      - 生成迁移计划
      - 预览迁移结果
      - 执行迁移
      - 验证迁移可行性
      - 估算数据丢失
      - 字段映射和转换
      - 警告和错误处理
  - id: ISSUE-C006~c6
    name: 场景配置管理UI
    status: completed
    notes: |
      移动端场景配置 UI 已实现：
      - SceneSelector 组件（已有）
      - SceneConfigPreview 组件（已有）
      - SceneConfigScreen 场景配置页面
      - SceneMigrationScreen 场景迁移页面
      - Scene API 服务封装

