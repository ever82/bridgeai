implementation_summary: |
  已成功实现场景配置管理系统，包含以下内容：

  1. **场景配置 Schema (c1)**:
     - SceneConfig 类型定义完善
     - 四个场景配置完整：VisionShare、AgentDate、AgentJob、AgentAd
     - 每个场景包含 metadata、fields、capabilities、templates、ui 配置

  2. **场景字段定义 (c2)**:
     - SceneFieldDefinition 类型支持 17 种字段类型
     - 完整的字段验证规则系统
     - 字段依赖关系支持
     - Zod 验证 Schema 为四个场景创建

  3. **场景模板系统 (c3)**:
     - TemplateService 实现完整 CRUD
     - 模板应用、复制、分享功能
     - 默认模板和预设模板支持

  4. **场景能力声明 (c4)**:
     - SceneCapabilityService 实现
     - 能力检查、依赖验证、版本管理
     - 能力状态查询和摘要

  5. **场景切换和迁移 (c5)**:
     - SceneMigrationService 实现
     - 迁移计划生成、预览、执行
     - 数据丢失估算和警告

  6. **场景配置管理UI (c6)**:
     - SceneConfigScreen 场景配置页面
     - SceneMigrationScreen 场景迁移页面
     - Scene API 服务封装

  所有验收标准已完成，单元测试已编写。


