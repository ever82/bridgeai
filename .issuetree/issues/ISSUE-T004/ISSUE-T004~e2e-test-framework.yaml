  - id: "ISSUE-T004~c7"
    name: "E2E测试稳定性保障"
    description: |
      确保测试长期稳定运行，控制Flaky Test:
      - **Flaky Test检测与处理**
        * 检测标准: 同一测试在相同代码下失败率>5%
        * 自动标记: CI中自动标记不稳定测试
        * 隔离机制: flaky测试移至单独套件
        * 修复SLA: 标记后3个工作日内修复
      - **测试重试策略**
        * 自动重试: 失败自动重试2次
        * 最终判定: 3次中1次通过即算通过
        * 重试记录: 记录重试次数用于分析
      - **等待策略优化**
        * 智能等待: 使用waitFor而非固定sleep
        * 超时阈值: 元素等待≤10秒
        * 轮询间隔: 200ms自适应轮询
      - **测试执行时间监控**
        * 单测试时间上限: 2分钟
        * 平均执行时间追踪
        * 超时测试自动告警
      - **稳定性指标**
        * 目标: Flaky rate < 2%
        * 监控: 每周生成稳定性报告
        * 告警: flaky rate>5%时Slack通知
      - **诊断工具**
        * 失败截图自动保存
        * 测试日志完整保留
        * 设备状态快照
