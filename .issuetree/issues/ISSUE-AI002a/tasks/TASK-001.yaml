name: Implement Demand Extraction Core Framework
description: |
  Implement the core framework for demand intelligence extraction service including:
  1. DemandExtractionService class - Natural language understanding, entity recognition, intent classification
  2. DemandToL2Mapper class - Map extracted fields to L2 model with attribute standardization
  3. ExtractionValidator class - Field completeness, business rules, validation
  4. API endpoints - /api/v1/ai/extract-demand with scene parameter

acceptance_criteria:
  - DemandExtractionService class with extract method returning structured Demand object with confidence field
  - DemandToL2Mapper class mapping extracted demand fields to AgentL2Model properties
  - ExtractionValidator class with validate method checking required fields, value ranges, enum validity
  - /api/v1/ai/extract-demand endpoint supporting scene parameter and returning extraction results
  - Unit tests for all components

