title: 信用过滤系统实现任务
description: |
  实现基于信用分的过滤系统，包括：
  1. 信用分范围筛选 (minCreditScore, maxCreditScore)
  2. 信用等级筛选 (excellent/good/average/poor)
  3. 场景特定信用门槛配置
  4. 门槛豁免机制
  5. 信用筛选UI组件 (CreditFilter)
  6. 信用不足提示组件 (CreditInsufficient)
  7. 单元测试覆盖

acceptance_criteria:
  - 信用筛选服务支持按分数范围和等级筛选
  - 场景门槛配置支持动态调整和豁免规则
  - 移动端UI组件包含滑块和等级选择
  - 信用不足提示包含提升建议和替代推荐
  - 单元测试覆盖率达标

