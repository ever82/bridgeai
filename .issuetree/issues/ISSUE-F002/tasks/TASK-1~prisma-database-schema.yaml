description: |-
  Implement the database schema for BridgeAI platform using Prisma ORM.

  Key requirements:
  1. Set up Prisma ORM with PostgreSQL
  2. Design and implement core entity models:
     - User (authentication, profile, metadata)
     - Agent (configuration, persona, settings)
     - Scene (VisionShare, AgentDate, AgentJob, AgentAd configurations)
     - Chat/Message (communication history)
     - Credit/Transaction (scoring system)
     - Matching (preferences, filters, results)
  3. Define relationships between entities
  4. Create migration files
  5. Generate Prisma client
  6. Add seed data for development

  Work in the worktree: .issuetree/issues/ISSUE-F002

  Acceptance Criteria:
  - Prisma schema is complete with all core models
  - Migrations can be applied successfully
  - Database connection is configured
  - Basic CRUD operations are testable
