description: |-
  Setup React Native mobile testing framework with Jest and Testing Library.

  Key requirements:
  1. Configure React Native Jest environment:
     - React Native Jest preset
     - Expo Jest configuration integration
     - Metro configuration for tests
     - Static asset mocks
     - Native module auto-mocks
  2. Setup React Native Testing Library:
     - @testing-library/react-native installation
     - render, screen tools
     - fireEvent event simulation
     - waitFor async handling
     - Test utility wrappers
