id: TASK-001
issue_id: ISSUE-C003
title: 实现地域过滤系统
slug: implement-location-system
status: completed
priority: high
assignee: developer
created_at: '2026-04-11'
updated_at: '2026-04-11'
description: |
  实现基于地理位置的过滤系统，包括地理编码服务、
  Agent位置服务、以及相关测试。

acceptance_criteria:
  - id: C1
    name: 地理位置数据模型
    status: completed
    notes: |
      Location类型已定义在 packages/shared/src/types/location.ts
      包含以下字段:
      - province, provinceName (省份代码和名称)
      - city, cityName (城市代码和名称)
      - district, districtName (区县代码和名称)
      - coordinates (经纬度坐标)
      - GeoJSON支持 (Point, Polygon)
      - 距离计算类型 (DistanceFilter, BoundingBox)
      - 地理围栏类型 (GeoFence, GeoFenceCheckResult)

  - id: C2
    name: 地理位置选择组件
    status: completed
    notes: |
      LocationPicker组件已实现 apps/mobile/src/components/LocationPicker.tsx
      功能包括:
      - 省市区三级联动选择器
      - Modal弹窗式UI
      - 进度指示器
      - 返回和关闭功能
      - 支持禁用状态

  - id: C3
    name: 距离计算和筛选
    status: completed
    notes: |
      距离计算已实现:
      - packages/shared/src/utils/geoUtils.ts: calculateDistance函数
        (使用Haversine公式计算两点间距离)
      - apps/server/src/services/locationSearchService.ts:
        * searchAgentsByLocation (按位置筛选Agent)
        * findAgentsWithinRadius (半径内查找Agent)
        * getDistanceBetweenAgents (计算Agent间距离)
      - apps/server/src/utils/geo.ts: 服务端地理工具函数

  - id: C4
    name: 地理围栏支持
    status: completed
    notes: |
      地理围栏功能已实现:
      - packages/shared/src/services/geoFencingService.ts:
        * createGeoFence (创建围栏)
        * getGeoFence (获取围栏)
        * updateGeoFence (更新围栏)
        * deleteGeoFence (删除围栏)
        * checkGeoFence (检查点是否在围栏内)
        * createCircularGeoFence (创建圆形围栏)
        * createRectangularGeoFence (创建矩形围栏)
      - packages/shared/src/utils/geoUtils.ts:
        * isPointInPolygon (射线投射算法判断点是否在多边形内)

  - id: C5
    name: 位置服务集成
    status: completed
    notes: |
      已实现的文件:
      - apps/server/src/services/geoCodingService.ts:
        * 高德地图API集成 (geocode, reverseGeocode)
        * 百度地图API集成
        * 地址联想搜索 (searchAddressSuggestions)
        * 地址解析 (parseAddress)
        * Mock实现用于测试
      - apps/mobile/src/services/locationService.ts:
        * 位置权限管理 (requestLocationPermission)
        * 获取当前位置 (getCurrentLocation)
        * 位置监听 (watchLocation)
        * 常用地址管理 (saveAddress, getSavedAddresses等)
        * 地址搜索API调用

  - id: C6
    name: Agent地理位置筛选集成
    status: completed
    notes: |
      已实现的文件:
      - apps/server/src/services/agentLocationService.ts:
        * Agent位置更新 (updateAgentLocation)
        * Agent位置获取 (getAgentLocation)
        * 位置搜索 (searchAgentsByLocation)
        * 附近Agent查找 (findNearbyAgents)
        * Agent间距离计算 (getDistanceBetweenAgents)
        * 位置隐私设置管理 (getLocationPrivacySettings, updateLocationPrivacySettings)
        * 批量更新 (batchUpdateAgentLocations)
        * 内存缓存机制

