id: 'ISSUE-API001'
issue_number: 901
title: 'API文档与测试基础框架'
slug: 'api-documentation-testing'
status: 'pending'
description: |
  建立API文档规范和基础测试框架，为后续E2E测试提供API层面的支持。
  
  包括API文档自动生成、API契约测试、基础API测试工具等。
prerequisites:
  - 'ISSUE-F003'
  - 'ISSUE-A002'
created_at: '2026-04-11'
logic: 'sufficient_necessary'
criteria:
  - id: 'ISSUE-API001~c1'
    name: 'API文档规范'
    description: |
      建立API文档规范:
      - OpenAPI/Swagger文档结构
      - API端点描述标准
      - 请求/响应示例规范
      - 错误码定义规范
    coverage:
      unit: 'not_needed'
      integration: 'required'
      e2e: 'not_needed'
      ai: 'not_needed'
      manual: 'required'
    verification:
      manual:
        checklist:
          - 'API文档结构符合OpenAPI 3.0规范'
          - '所有端点有完整的描述和示例'
          - '错误码统一且文档化'
  - id: 'ISSUE-API001~c2'
    name: 'API契约测试框架'
    description: |
      实现API契约测试:
      - 请求/响应格式验证
      - 字段类型检查
      - 必填字段验证
      - 契约变更检测
    coverage:
      unit: 'not_needed'
      integration: 'required'
      e2e: 'not_needed'
      ai: 'not_needed'
      manual: 'not_needed'
    verification:
      integration:
        command: 'npm run test:api:contract'
        timeout: 120
  - id: 'ISSUE-API001~c3'
    name: 'API测试工具集'
    description: |
      提供API测试工具:
      - API测试辅助函数
      - 测试数据生成器
      - 认证令牌管理
      - 响应验证工具
    coverage:
      unit: 'required'
      integration: 'required'
      e2e: 'required'
      ai: 'not_needed'
      manual: 'not_needed'
    verification:
      unit:
        command: 'npm run test:unit -- --testPathPattern=api-test-utils'
        timeout: 60
