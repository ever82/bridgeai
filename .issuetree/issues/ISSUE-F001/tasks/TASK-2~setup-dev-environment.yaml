  1. **pnpm 9.0.0** - 通过 npm install -g pnpm@latest 安装 ✓
  2. **Redis 8.6.2** - 从源码编译安装到 ~/.local/bin ✓
  3. **Detox CLI** - 通过 npm install -g detox-cli 安装 ✓
