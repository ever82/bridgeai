  ### 无法安装的软件
  1. **PostgreSQL >= 15** - 网络限制导致无法下载 (raw.githubusercontent.com SSL错误, 镜像下载失败)
  2. **Xcode 完整版** - 需要通过 Mac App Store 手动安装
  3. **Android Studio** - 未安装，需要从官网下载

  ### 部分完成
  - **pnpm install**: 依赖部分安装完成，但 esbuild 因 macOS 11 兼容性问题安装失败
    - 错误: esbuild 构建于 Mac OS X 12.0，当前系统为 macOS 11 (Big Sur)
    - 部分 node_modules 已创建，基础依赖可用

  ## 下一步建议
  1. 手动安装 PostgreSQL 15:
     - 方案A: 从 https://postgresapp.com/ 下载 Postgres.app
     - 方案B: 使用 Docker 运行 PostgreSQL (如果 Docker 可用)
     - 方案C: 从 https://www.enterprisedb.com/downloads/postgres-postgresql-downloads 下载安装程序

  2. 安装完整 Xcode (如需 iOS 开发):
     - 从 Mac App Store 搜索 "Xcode" 并安装

  3. 安装 Android Studio (如需 Android 开发):
     - 从 https://developer.android.com/studio 下载

  4. 解决 esbuild 兼容性问题:
     - 升级 macOS 到 12.0+，或
     - 在 package.json 中降级 esbuild 到支持 macOS 11 的版本

  ## 环境配置
  - 添加以下到 ~/.zshrc 或 ~/.bash_profile:
    ```
    export PATH="$HOME/.local/bin:$PATH"
    ```
  - Redis 已在后台运行 (通过 redis-server --daemonize yes)
