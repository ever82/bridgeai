description: |-
  安装 VisionShare 项目开发所需的所有软件依赖：

  ## 必需软件
  1. **pnpm** (>= 9.0.0) - Node.js 包管理器
  2. **PostgreSQL** (>= 15) - 数据库，需带 PostGIS 扩展
  3. **Redis** (>= 7.0) - 缓存/队列

  ## E2E 测试软件（可选但建议安装）
  4. **Detox CLI** - E2E 测试框架
  5. **Xcode** (macOS) - iOS 开发和模拟器
  6. **Android Studio** - Android SDK 和模拟器
  7. **iOS 模拟器** - iPhone 14, iOS 16.0+
  8. **Android 模拟器** - Pixel 6 API 33+

  ## 安装步骤
  1. 检查当前已安装的软件版本
  2. 安装缺失的必需软件 (pnpm, PostgreSQL, Redis)
  3. 启动 PostgreSQL 和 Redis 服务
  4. 安装 E2E 测试软件 (Detox CLI)
  5. 检查并报告 Xcode 安装状态
  6. 检查并报告 Android Studio 安装状态
  7. 验证所有安装是否成功
  8. 运行 `pnpm install` 安装项目依赖
  9. 提供下一步配置指导

  ## 成功标准
  - `pnpm --version` 返回 >= 9.0.0
  - `psql --version` 返回 >= 15
  - `redis-cli --version` 返回 >= 7.0
  - `detox --version` 能正常返回版本号
  - PostgreSQL 服务正在运行
  - Redis 服务正在运行
  - `pnpm install` 能成功完成
result: |-
