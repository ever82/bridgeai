  - id: "ISSUE-CR002~c1"
    name: "评价数据模型"
    description: |
      评价系统数据库设计:
      - Review 表设计(评价ID、评价者、被评价者、评分、内容、场景类型)
      - ReviewReply 表设计(评价回复)
      - ReviewReport 表设计(评价举报)
      - ReviewStats 表设计(评价统计缓存)
      - 索引优化(按用户ID和场景类型查询)
    status: "pending"
    coverage:
      unit: required
      integration: required
      e2e: not_needed
      ai: sufficient
      manual: not_needed
    verification:
      ai:
        prompt: "检查评价数据模型，验证Prisma schema中有Review、ReviewReply、ReviewReport、ReviewStats模型，确认关联关系和索引"
        context_files: ["packages/database/prisma/schema.prisma", "packages/shared/src/types/review.ts"]
        model: "claude-sonnet-4-6"

  - id: "ISSUE-CR002~c2"
    name: "双向评分API"
    description: |
      评分提交和查询接口:
      - POST /api/v1/reviews - 提交评价
      - GET /api/v1/reviews/received - 获取收到的评价
      - GET /api/v1/reviews/given - 获取发出的评价
      - PUT /api/v1/reviews/:id/reply - 回复评价
      - DELETE /api/v1/reviews/:id - 删除评价(管理员)
      - 评价权限验证(交易完成后才可评价)
    status: "pending"
    coverage:
      unit: required
      integration: required
      e2e: required
      ai: sufficient
      manual: not_needed
    verification:
      ai:
        prompt: "检查评分API，验证有reviews端点支持CRUD操作，确认权限控制和交易关联验证"
        context_files: ["apps/server/src/routes/reviews.ts", "apps/server/src/services/reviewService.ts"]
        model: "claude-sonnet-4-6"

  - id: "ISSUE-CR002~c3"
    name: "评价审核与反作弊"
    description: |
      评价内容审核机制:
      - 敏感词过滤和AI内容审核
      - 恶意刷评价检测(同一用户多次评价)
      - 评价真实性验证(需有实际交互)
      - 申诉和举报处理流程
      - 异常评价自动标记
    status: "pending"
    coverage:
      unit: required
      integration: required
      e2e: required
      ai: sufficient
      manual: not_needed
    verification:
      ai:
        prompt: "检查评价审核机制，验证有内容审核服务和反作弊检测，确认敏感词过滤和异常评价标记逻辑"
        context_files: ["apps/server/src/services/reviewModerationService.ts", "apps/server/src/services/reviewAntiCheatService.ts"]
        model: "claude-sonnet-4-6"

  - id: "ISSUE-CR002~c4"
    name: "评价展示组件"
    description: |
