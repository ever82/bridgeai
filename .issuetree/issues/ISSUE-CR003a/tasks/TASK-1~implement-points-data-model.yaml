result: |
  成功实现了积分账户数据模型：

  1. **Prisma Schema 更新** (apps/server/prisma/schema.prisma)
     - PointsAccount 模型：包含 userId, balance, totalEarned, totalSpent, frozenAmount, version 字段
     - PointsTransaction 模型：包含 accountId, userId, type, amount, balanceAfter, description, scene, referenceId, metadata 字段
     - PointsFreeze 模型：包含 accountId, transactionId, amount, reason, scene, referenceId, status, expiresAt 字段
     - 枚举类型：PointsTransactionType, FreezeStatus
     - 添加了 User 与 PointsAccount 的一对一关系
     - 配置了级联删除（Cascade）和 SetNull 约束

  2. **TypeScript 类型定义** (packages/shared/src/types/points.ts)
     - 定义了所有接口：PointsAccount, PointsTransaction, PointsFreeze
     - 定义了枚举：PointsTransactionType, FreezeStatus, SceneCode
     - 定义了请求/响应类型：CreatePointsTransactionRequest, CreatePointsFreezeRequest
     - 定义了操作结果类型：PointsOperationResult
     - 添加了交易类型和冻结状态的配置常量

  3. **类型导出** (packages/shared/src/types.ts)
     - 添加了 points 类型的导出

  4. **单元测试** (apps/server/src/models/__tests__/points.test.ts)
     - 22 个测试用例全部通过
     - 测试覆盖了：PointsAccount, PointsTransaction, PointsFreeze 模型
     - 测试验证了：唯一约束、级联删除、关系、分页查询、状态过滤、乐观锁等

  5. **核心特性**
     - 账户唯一性约束（userId 唯一）
     - 乐观锁机制（version 字段）
     - 余额计算（可用余额 = balance - frozenAmount）
     - 交易类型完整（收入/支出类型）
     - 冻结记录支持过期自动释放
     - 支持按场景过滤（VISION_SHARE, AGENT_DATE, AGENT_JOB, AGENT_AD）

