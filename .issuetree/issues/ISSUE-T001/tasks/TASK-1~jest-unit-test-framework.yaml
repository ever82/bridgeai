description: |-
  Setup Jest unit test framework for the BridgeAI backend server.

  Key requirements:
  1. Configure Jest with TypeScript support (ts-jest)
  2. Setup test environment isolation:
     - Independent test database configuration
     - Test environment variables (.env.test)
     - Test data cleanup mechanisms
  3. Create Mock and Stub utilities:
     - Prisma Client auto-mock
     - External API mock tools
     - Redis/cache mocks
  4. Implement test data factories using faker.js:
     - User factory
     - Agent factory
     - Message/chat factory
  5. Configure code coverage reporting:
     - Coverage thresholds (80% recommended)
     - Multiple report formats (HTML/text/lcov)
     - CI integration
  6. Write example unit tests:
     - Service layer tests
     - Utility function tests
     - Middleware tests

  Work in the worktree: .issuetree/issues/ISSUE-T001

  Prerequisites:
  - ISSUE-F003 (Express backend) must be completed
  - ISSUE-A001 (User auth) should be available for testing

  Acceptance Criteria:
  - Jest configuration is complete with TypeScript support
  - Test database is isolated from development/production
  - Mock utilities are available for common dependencies
  - Example tests pass successfully
  - Coverage reports can be generated
