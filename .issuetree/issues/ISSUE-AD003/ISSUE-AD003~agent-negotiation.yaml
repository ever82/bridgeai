id: ISSUE-AD003
issue_number: 1003
title: Agent优惠协商谈判
slug: agent-negotiation
status: implemented
description: |
  AgentAd场景的核心协商谈判模块。消费者Agent与多个匹配的商家Agent进行群聊，
  基于各自的需求画像和优惠方案进行自动化谈判协商。利用AI002(需求提炼)、
  AI003(供给提炼)和AI004(对话生成)服务，实现智能的优惠方案推荐、
  条件磋商和最优方案选择，最终为消费者提供最佳购买建议。
prerequisites:
  - ISSUE-COM002c
  - ISSUE-AI002
  - ISSUE-AI003
  - ISSUE-AI004
logic: sufficient_necessary
created_at: 2026-04-08
complexity:
  level: "H"
  description: "涉及多方Agent通信、AI服务调用、人机交互等复杂场景"
  lines: 1200
  test_time: 10
  split: true
  split_strategy: "按流程拆分: 群聊创建 → 协商对话 → 对比推荐"
criteria:
  - id: AD003-CR01
    name: 匹配商家群聊创建
    description: |
      当M002匹配引擎为消费者Agent找到符合条件的商家Agent后，
      自动创建消费者-多商家的群聊房间，所有参与方Agent加入群聊。
    status: pending
    coverage: 92
    coverage_detail:
      unit: required
      integration: required
      e2e: required
      ai: sufficient
      manual: required
    verification:
      ai_prompt: |
        验证当匹配结果产生时，系统是否自动调用COM002c创建群聊房间，
        检查房间成员是否包含消费者Agent和所有匹配的商家Agent，
        确认房间类型为"AGENT_AD_NEGOTIATION"，支持多方Agent同时在线通信。

  - id: AD003-CR02
    name: Agent自动介绍与需求表达
    description: |
      消费者Agent利用AI004服务自动生成开场白，向商家Agent群体
      清晰表达消费需求、预算范围、期望优惠等信息，启动协商流程。
    status: pending
    coverage: 90
    coverage_detail:
      unit: required
      integration: required
      e2e: required
      ai: sufficient
      manual: not_needed
    verification:
      ai_prompt: |
        测试AI004服务是否根据AD001配置的消费画像生成合适的开场白，
        验证消息内容是否包含关键需求信息(品类、预算、时间要求等)，
        确认消息格式符合COM004定义的Agent通信协议。

  - id: AD003-CR03
    name: 商家Agent优惠方案展示
    description: |
      各商家Agent在群聊中主动展示或回应查询，介绍自己的优惠方案，
      包括优惠内容、使用条件、额外福利等，由AI004生成自然语言描述。
    status: pending
    coverage: 88
    coverage_detail:
      unit: required
      integration: required
      e2e: required
      ai: sufficient
      manual: not_needed
    verification:
      ai_prompt: |
        验证商家Agent是否基于AD002配置的优惠方案生成介绍消息，
        检查AI004是否正确将结构化优惠信息转换为自然语言描述，
        确认优惠信息展示包含必要信息(类型、力度、适用范围)。

  - id: AD003-CR04
    name: 智能条件协商与追问
    description: |
      消费者Agent可以根据商家提供的方案进行智能追问和条件协商，
      如询问是否可以叠加其他优惠、是否可以延长有效期、是否还有其他隐藏福利等。
    status: pending
    coverage: 85
    coverage_detail:
      unit: required
      integration: required
      e2e: required
      ai: sufficient
      manual: required
    verification:
      ai_prompt: |
        测试消费者Agent是否能够针对商家报价提出合理的协商问题，
        验证AI004生成的追问内容是否符合消费画像的需求优先级，
        确认商家Agent能否正确理解和回应协商请求。

  - id: AD003-CR05
    name: 多方案对比分析
    description: |
      消费者Agent利用AI002服务对多个商家的优惠方案进行对比分析，
      综合考虑优惠力度、适用性、便利性等因素，生成对比报告供用户决策。
    status: pending
    coverage: 87
    coverage_detail:
      unit: required
      integration: required
      e2e: required
      ai: sufficient
      manual: not_needed
    verification:
      ai_prompt: |
        验证当收到3个以上商家方案时，AI002是否能生成结构化的对比分析，
        检查分析维度是否包含优惠价值、匹配度、限制条件等，
        确认对比结果以易读的格式展示给消费者。

  - id: AD003-CR06
    name: 最优方案推荐与人工确认
    description: |
      Agent协商完成后，向消费者推荐最优方案，清晰说明推荐理由。
      消费者可以一键接受推荐、选择其他方案或继续协商，实现人机协作决策。
    status: pending
    coverage: 90
    coverage_detail:
      unit: required
      integration: required
      e2e: required
      ai: sufficient
      manual: required
    verification:
      ai_prompt: |
        检查协商完成后系统是否生成推荐报告，包含推荐商家、优惠详情、
        推荐理由等，验证用户界面是否提供"接受推荐"、"查看其他"、
        "继续协商"等选项，确认COM003人机切换机制正确触发。
