description: |-
  Initialize the Expo mobile application for BridgeAI platform.

  Key requirements:
  1. Create Expo project with TypeScript template
  2. Set up navigation structure:
     - React Navigation with bottom tabs
     - Stack navigators for each feature
     - Authentication flow navigation
  3. Configure project structure:
     - screens/ - Screen components
     - components/ - Reusable UI components
     - navigation/ - Navigation configuration
     - services/ - API client and services
     - hooks/ - Custom React hooks
     - stores/ - State management (Zustand/Context)
     - utils/ - Utility functions
     - types/ - TypeScript type definitions
     - assets/ - Images, fonts, etc.
  4. Set up environment configuration
  5. Configure app.json/app.config.js
  6. Add essential dependencies:
     - Navigation libraries
     - HTTP client (axios/fetch)
     - State management
     - Form handling
  7. Create splash screen and app icon placeholders

  Work in the worktree: .issuetree/issues/ISSUE-F004

  Acceptance Criteria:
  - Expo project runs successfully (npm start)
  - Navigation structure is functional
  - Project structure is organized
  - Can build for iOS/Android
