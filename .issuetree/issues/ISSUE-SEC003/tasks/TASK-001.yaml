title: API限流与安全防护实现
description: |
  实现API限流与安全防护机制，包括：
  1. 请求限流机制（基于IP、用户、端点差异化）
  2. DDoS防护（异常流量检测、自动封禁）
  3. IP黑白名单控制
  4. 请求安全校验（大小限制、Content-Type校验）
  5. CORS白名单配置
  6. 安全事件监控服务
acceptance_criteria:
  - id: ISSUE-SEC003~c1
    name: 请求限流机制
    status: completed
    result: passed
    notes: |
      已实现基于IP、用户、端点的差异化限流：
      - 使用express-rate-limit实现IP限流
      - 实现userRateLimiter中间件进行用户级别限流
      - 不同用户角色(anonymous/authenticated/premium/admin)有不同限流阈值
      - 端点差异化限流(auth/upload/search/webhook/admin/sensitive)
      - 响应头包含X-RateLimit-Limit/X-RateLimit-Remaining/X-RateLimit-Reset
      文件: src/middleware/rateLimiter.ts, src/config/rateLimit.ts
  - id: ISSUE-SEC003~c2
    name: DDoS防护
    status: completed
    result: passed
    notes: |
      已实现DDoS攻击防护：
      - 异常流量检测(请求频率、突发流量检测)
      - 自动IP封禁机制(当检测到攻击时自动封禁)
      - 慢速攻击防护(timeout配置和slowAttackProtection中间件)
      - 流量监控统计和实时告警
      文件: src/middleware/ddosProtection.ts, src/services/firewall.ts
  - id: ISSUE-SEC003~c3
    name: IP黑白名单
    status: completed
    result: passed
    notes: |
      已实现IP访问控制：
      - IP白名单机制(支持单IP和CIDR范围)
      - IP黑名单机制(支持单IP和CIDR范围)
      - 支持whitelist/blacklist/disabled三种模式
      - 地理位置限制支持(通过Cloudflare header)
      - IP信誉检查框架
      文件: src/middleware/ipFilter.ts, src/config/ipList.ts
  - id: ISSUE-SEC003~c4
    name: 请求安全校验
    status: completed
    result: passed
    notes: |
      已实现请求安全防护：
      - 请求体大小限制(10MB)
      - XSS攻击防护(检测script标签、事件处理器等)
      - SQL注入防护(检测UNION、DROP等关键字)
      - NoSQL注入防护(检测MongoDB操作符)
      文件: src/middleware/security.ts, src/config/cors.ts
  - id: ISSUE-SEC003~c5
    name: CORS与安全头
    status: completed
    result: passed
    notes: |
      已实现CORS和安全头配置：
      - CORS白名单配置(支持环境变量配置)
      - Helmet中间件配置(CSP、HSTS、X-Frame-Options等)
      - 安全响应头设置(X-Content-Type-Options、Referrer-Policy等)
      - Permissions Policy配置
      文件: src/config/cors.ts, src/app.ts
  - id: ISSUE-SEC003~c6
    name: 安全事件监控
    status: completed
    result: passed
    notes: |
      已实现安全监控：
      - 攻击行为日志记录(logSecurityEvent)
      - 异常请求统计分析(实时聚合)
      - 安全事件告警通知(阈值触发)
      - 封禁IP管理界面(/admin/security/*端点)
      - 安全数据导出(JSON/CSV)
      文件: src/services/securityMonitor.ts, src/services/firewall.ts, src/routes/admin/index.ts
