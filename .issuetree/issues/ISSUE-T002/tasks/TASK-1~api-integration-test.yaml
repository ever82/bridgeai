description: |-
  Setup API integration test framework using Supertest for HTTP endpoint testing.

  Key requirements:
  1. Configure Supertest with Express app:
     - Supertest library integration
     - HTTP request base class/helpers
     - Global request defaults
     - Error handling test support
  2. Setup test database lifecycle management:
     - Database migrations before tests
     - Transaction rollback per test case
     - Test data seeding
     - Concurrent test isolation
  3. Create authentication test helpers:
     - JWT token generation helpers
     - Test user login helpers
     - Role-based permission test templates
  4. Implement API response validation tools:
     - JSON Schema validation
     - Response time assertions
     - HTTP status code validation
     - Error response format validation
  5. Write integration test examples:
     - Authentication API tests
     - User API tests
     - Agent API tests
     - Error scenario tests
  6. Setup API contract testing:
     - OpenAPI/Swagger contract validation
     - Request/response field type checking

  Work in the worktree: .issuetree/issues/ISSUE-T002

  Prerequisites:
  - ISSUE-F003 (Express backend) must be completed

  Acceptance Criteria:
  - Supertest is configured and working
  - Test database lifecycle is managed properly
  - Auth helpers are available
  - Example integration tests pass
  - API contract validation is in place
