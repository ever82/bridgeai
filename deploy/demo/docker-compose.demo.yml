version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: bridgeai_postgres_demo
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-demo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-bridgeai_demo}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_demo_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-demo_user}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bridgeai-demo

  redis:
    image: redis:7-alpine
    container_name: bridgeai_redis_demo
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_demo_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bridgeai-demo

  minio:
    image: minio/minio:latest
    container_name: bridgeai_minio_demo
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_demo_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - bridgeai-demo

  server:
    build:
      context: ../../apps/server
      dockerfile: Dockerfile
    container_name: bridgeai_server_demo
    environment:
      NODE_ENV: demo
      DATABASE_URL: postgresql://${POSTGRES_USER:-demo_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-bridgeai_demo}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-demo-jwt-secret-change-in-production}
      DEMO_MODE: 'true'
      SENTRY_DSN: ${SENTRY_DSN:-}
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-minioadmin}
      AWS_REGION: us-east-1
      S3_BUCKET: bridgeai-demo
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
    ports:
      - '${SERVER_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../apps/server/logs:/app/logs
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bridgeai-demo

  nginx:
    image: nginx:alpine
    container_name: bridgeai_nginx_demo
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/certs:ro
      - ./ssl:/etc/ssl/private:ro
    depends_on:
      - server
    networks:
      - bridgeai-demo

volumes:
  postgres_demo_data:
  redis_demo_data:
  minio_demo_data:

networks:
  bridgeai-demo:
    name: bridgeai-demo
    driver: bridge
