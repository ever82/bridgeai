input {
  beats {
    port => 5044
  }
}

filter {
  if [fields][service] == "bridgeai-server" {
    json {
      source => "message"
    }
    date {
      match => ["timestamp", "ISO8601"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "bridgeai-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}