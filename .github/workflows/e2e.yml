name: E2E Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - '.detoxrc.js'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, labeled]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test (ios/android/both)'
        required: true
        default: 'both'
      configuration:
        description: 'Build configuration (debug/release)'
        required: true
        default: 'debug'

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  RUBY_VERSION: '3.2'
  E2E_API_URL: 'http://localhost:3001'

jobs:
  ios-e2e:
    runs-on: macos-13
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'e2e-required')
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install dependencies
        run: |
          npm ci
          cd apps/mobile && npm ci

      - name: Install CocoaPods
        run: |
          cd apps/mobile/ios
          pod install --repo-update

      - name: Prebuild and build iOS app
        run: |
          cd apps/mobile
          npx detox build --configuration ios.sim.${{ github.event.inputs.configuration || 'debug' }}

      - name: Run iOS E2E tests
        run: |
          cd apps/mobile
          npx detox test --configuration ios.sim.${{ github.event.inputs.configuration || 'debug' }} --cleanup
        env:
          DETOX_CONFIGURATION: ios.sim.${{ github.event.inputs.configuration || 'debug' }}

      - name: Upload test artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-e2e-artifacts
          path: |
            apps/mobile/artifacts/
            apps/mobile/e2e/reports/
          retention-days: 7

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: ios-e2e-report
          path: apps/mobile/e2e/reports/
          retention-days: 30

  android-e2e:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'e2e-required')
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: |
          npm ci
          cd apps/mobile && npm ci

      - name: Prebuild Android
        run: |
          cd apps/mobile
          npx expo prebuild --platform android

      - name: Build Android app
        run: |
          cd apps/mobile
          npx detox build --configuration android.emu.${{ github.event.inputs.configuration || 'debug' }}

      - name: Run Android E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            cd apps/mobile
            npx detox test --configuration android.emu.${{ github.event.inputs.configuration || 'debug' }} --cleanup
        env:
          DETOX_CONFIGURATION: android.emu.${{ github.event.inputs.configuration || 'debug' }}

      - name: Upload test artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-artifacts
          path: |
            apps/mobile/artifacts/
            apps/mobile/e2e/reports/
          retention-days: 7

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-report
          path: apps/mobile/e2e/reports/
          retention-days: 30

  stability-report:
    runs-on: ubuntu-latest
    needs: [ios-e2e, android-e2e]
    if: always() && github.event_name == 'schedule'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate stability report
        run: |
          echo "# Weekly E2E Stability Report" > stability-report.md
          echo "" >> stability-report.md
          echo "Generated: $(date)" >> stability-report.md
          echo "" >> stability-report.md
          cat artifacts/ios-e2e-report/*.md >> stability-report.md 2>/dev/null || true
          cat artifacts/android-e2e-report/*.md >> stability-report.md 2>/dev/null || true

      - name: Post to Slack
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Weekly E2E Stability Report",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "📊 *Weekly E2E Stability Report*\n\nView the full report in the workflow artifacts."
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_E2E_WEBHOOK }}

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('stability-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## E2E Test Results\n\n${report}`
            });
