name: Maestro E2E (AI Agent Layer)

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/mobile/e2e/maestro/**'
      - 'apps/mobile/src/**'
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test (ios/android/both)'
        required: true
        default: 'ios'

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  maestro-ios:
    runs-on: macos-13
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd apps/mobile && npm ci

      - name: Install Maestro
        run: |
          cd apps/mobile
          brew install maestro || curl -s "https://get.maestro.mobile.dev" | bash

      - name: Start iOS Simulator
        run: xcrun simctl boot 'iPhone 14'
        with:
          action: boot

      - name: Run Maestro Auth Flow
        run: |
          cd apps/mobile
          npx ts-node e2e/maestro/run-tests.ts test:auth ios
        continue-on-error: true

      - name: Upload Maestro Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-reports
          path: apps/mobile/e2e/maestro/reports/
          retention-days: 7

  maestro-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.inputs.platform != 'ios'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          npm ci
          cd apps/mobile && npm ci

      - name: Install Maestro
        run: |
          curl -s "https://get.maestro.mobile.dev" | bash

      - name: Run Maestro Auth Flow
        run: |
          cd apps/mobile
          npx ts-node e2e/maestro/run-tests.ts test:auth android
        continue-on-error: true

      - name: Upload Maestro Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-reports
          path: apps/mobile/e2e/maestro/reports/
          retention-days: 7
