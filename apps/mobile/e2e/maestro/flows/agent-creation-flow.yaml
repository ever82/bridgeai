# issue: ISSUE-AGENT-001
# description: Agent 创建流程

appId: com.bridgeai.mobile
env:
  TEST_EMAIL: 'test@bridgeai.test'
  TEST_PASSWORD: 'TestPass123!'
  AGENT_NAME: 'E2E Test Agent ${TIMESTAMP}'

---
# 快速登录
- launchApp
- waitForAnimationToEnd

# 额外等待 App 初始化完成
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# 等待登录表单
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 20000

- tapOn:
    id: "login-email-input"
- inputText: '${TEST_EMAIL}'
- tapOn:
    id: "login-password-input"
- inputText: '${TEST_PASSWORD}'
- tapOn:
    id: "login-button"
- waitForAnimationToEnd

# 等待首页
- extendedWaitUntil:
    visible:
      id: "home-header"
    timeout: 30000

# 导航到 Profile tab
- tapOn:
    label: "profile-tab"
- waitForAnimationToEnd

# 验证 Profile 页面元素
- assertVisible:
    id: "profile-logout-button"

# 验证消息 tab 可切换
- tapOn:
    label: "messages-tab"
- waitForAnimationToEnd

# 验证发现 tab 可切换
- tapOn:
    label: "discover-tab"
- waitForAnimationToEnd

# 返回首页
- tapOn:
    label: "home-tab"
- waitForAnimationToEnd
- assertVisible:
    id: "home-header"