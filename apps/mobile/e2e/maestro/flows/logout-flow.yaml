# issue: ISSUE-AUTH-002
# description: 用户退出登录流程

appId: com.bridgeai.mobile
env:
  TEST_EMAIL: 'test@bridgeai.test'
  TEST_PASSWORD: 'TestPass123!'

---
# 确保登录
- launchApp
- waitForAnimationToEnd

# 额外等待 App 初始化完成
- waitForAnimationToEnd

# 等待登录表单
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 20000

# 快速登录
- tapOn:
    id: "login-email-input"
- inputText: '${TEST_EMAIL}'
- tapOn:
    id: "login-password-input"
- inputText: '${TEST_PASSWORD}'
- tapOn:
    id: "login-button"
- waitForAnimationToEnd

# 等待首页
- extendedWaitUntil:
    visible:
      id: "home-header"
    timeout: 30000

# 导航到 Profile tab
- tapOn:
    label: "profile-tab"
- waitForAnimationToEnd

# 点击登出按钮
- extendedWaitUntil:
    visible:
      id: "profile-logout-button"
    timeout: 10000
- tapOn:
    id: "profile-logout-button"
- waitForAnimationToEnd

# 验证返回登录页
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 10000
- assertVisible:
    id: "login-button"