# issue: ISSUE-HOME-001
# description: 首页推荐和 Tab 导航验证

appId: com.bridgeai.mobile
env:
  TEST_EMAIL: 'test@bridgeai.test'
  TEST_PASSWORD: 'TestPass123!'

---
# 快速登录
- launchApp
- waitForAnimationToEnd

# 额外等待 App 初始化完成
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# 等待登录表单
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 20000

- tapOn:
    id: "login-email-input"
- inputText: '${TEST_EMAIL}'
- tapOn:
    id: "login-password-input"
- inputText: '${TEST_PASSWORD}'
- tapOn:
    id: "login-button"
- waitForAnimationToEnd

# 等待首页
- extendedWaitUntil:
    visible:
      id: "home-header"
    timeout: 30000

# 验证首页内容
- assertVisible:
    id: "home-header"
- assertVisible:
    id: "home-moments-list"

# Tab 切换测试
- tapOn:
    label: "messages-tab"
- waitForAnimationToEnd
- assertVisible:
    id: "messages-list"

- tapOn:
    label: "discover-tab"
- waitForAnimationToEnd

- tapOn:
    label: "profile-tab"
- waitForAnimationToEnd
- assertVisible:
    id: "profile-logout-button"

- tapOn:
    label: "home-tab"
- waitForAnimationToEnd
- assertVisible:
    id: "home-header"