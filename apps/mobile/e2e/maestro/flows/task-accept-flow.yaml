# issue: ISSUE-TASK-002
# description: VisionShare 任务接单流程

appId: com.bridgeai.mobile
env:
  TEST_EMAIL: 'test-${TIMESTAMP}-${RANDOM}@bridgeai.test'
  TEST_PASSWORD: 'TestPass123!'

---
# 快速登录
- launchApp

# 等待登录表单
- extendedWaitUntil:
    visible:
      id: 'login-email-input'
    timeout: 30000

- tapOn:
    id: 'login-email-input'
- inputText: '${TEST_EMAIL}'
- tapOn:
    id: 'login-password-input'
- inputText: '${TEST_PASSWORD}'
- tapOn:
    id: 'login-button'
- waitForAnimationToEnd

# 等待首页
- extendedWaitUntil:
    visible:
      id: 'home-header'
    timeout: 30000

# 断言1: 首页可见
- assertVisible:
    id: 'home-header'

# 导航到 Discover tab 寻找任务
- tapOn:
    label: 'discover-tab'
- waitForAnimationToEnd

# 进入 VisionShare 模块
- tapOn:
    text: 'VisionShare'
- waitForAnimationToEnd

# 断言2: 查看"我的任务"入口可见
- tapOn:
    text: '我的任务'

# 断言3: 任务列表页面可见（通过等待内容加载）
- waitForAnimationToEnd

# 导航到任务浏览（附近任务）
- tapOn:
    text: '附近任务'

# 断言4: 任务列表加载完成
- waitForAnimationToEnd

# 点击第一个任务查看详情
- tapOn:
    index: 0

# 断言5: 任务详情页面可见（确认接单按钮区域加载）
- waitForAnimationToEnd

# 查看任务信息后返回
- back
- waitForAnimationToEnd
