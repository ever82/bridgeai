# issue: ISSUE-AUTH-001
# description: 用户登录测试

appId: com.bridgeai.mobile
env:
  TEST_EMAIL: 'test@bridgeai.test'
  TEST_PASSWORD: 'TestPass123!'

---
# 停止现有 App
- stopApp

# 启动 App
- launchApp

# 等待 App 完全加载
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# 等待登录表单
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 30000

# 输入邮箱
- tapOn:
    id: "login-email-input"
- inputText: '${TEST_EMAIL}'

# 输入密码
- tapOn:
    id: "login-password-input"
- inputText: '${TEST_PASSWORD}'

# 点击登录
- tapOn:
    id: "login-button"

# 等待登录完成
- waitForAnimationToEnd
- waitForAnimationToEnd

# 等待首页出现
- extendedWaitUntil:
    visible:
      id: "home-header"
    timeout: 30000

# 验证首页内容
- assertVisible:
    id: "home-moments-list"