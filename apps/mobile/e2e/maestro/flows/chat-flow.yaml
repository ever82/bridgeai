# issue: ISSUE-CHAT-001
# description: 消息列表和聊天发送接收交互（覆盖 ChatInput / AttachmentPicker / QuickReply / IdentitySwitcher / EmojiPicker / MessageBubble）

appId: com.bridgeai.mobile
env:
  TEST_EMAIL: 'test-${TIMESTAMP}-${RANDOM}@bridgeai.test'
  TEST_PASSWORD: 'TestPass123!'
  TEST_MESSAGE: 'Maestro E2E test message ${TIMESTAMP}'

---
# 快速登录
- launchApp

# 等待登录表单
- extendedWaitUntil:
    visible:
      id: 'login-email-input'
    timeout: 30000

- tapOn:
    id: 'login-email-input'
- inputText: '${TEST_EMAIL}'
- tapOn:
    id: 'login-password-input'
- inputText: '${TEST_PASSWORD}'
- tapOn:
    id: 'login-button'
- waitForAnimationToEnd

# 等待首页
- extendedWaitUntil:
    visible:
      id: 'home-header'
    timeout: 30000

# 导航到消息 tab
- tapOn:
    label: 'messages-tab'
- waitForAnimationToEnd

# ── 断言 1: 消息列表页面可见 ──────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: 'messages-list'
    timeout: 10000
- assertVisible:
    id: 'messages-list'

# ── 断言 2: 点击第一个会话进入聊天 ─────────────────────────────────
- tapOn:
    index: 0
- waitForAnimationToEnd

# ── 断言 3: 聊天界面核心元素可见（含 MessageList，承载 MessageBubble） ──
- extendedWaitUntil:
    visible:
      id: 'chat-identity-switcher'
    timeout: 10000
- assertVisible:
    id: 'chat-identity-switcher'
- assertVisible:
    id: 'chat-message-list'
- assertVisible:
    id: 'send-button'
- assertVisible:
    id: 'emoji-button'
- assertVisible:
    id: 'chat-message-input'

# ── 场景 A: EmojiPicker 交互 ────────────────────────────────────────
# A-1: 打开 emoji 选择器
- tapOn:
    id: 'emoji-button'
- waitForAnimationToEnd

# A-2: 验证 emoji picker 已展开（搜索框可见）
- assertVisible:
    id: 'emoji-search-input'

# A-3: 选择分类（常用 or 第一个可用分类）
- runFlow:
    when:
      visible:
        id: 'emoji-category-常用'
    commands:
      - tapOn:
          id: 'emoji-category-常用'
      - waitForAnimationToEnd

# A-4: 搜索 emoji
- tapOn:
    id: 'emoji-search-input'
- inputText: '😊'
- waitForAnimationToEnd

# A-5: 关闭 emoji picker（回到输入状态，emoji 已在搜索框中）
- tapOn:
    id: 'emoji-button'
- waitForAnimationToEnd

# ── 场景 B: ChatInput 输入并发送消息 ───────────────────────────────
# B-1: 点击输入框并输入文本
- tapOn:
    id: 'chat-message-input'
- inputText: '${TEST_MESSAGE}'
- waitForAnimationToEnd

# B-2: 点击发送
- tapOn:
    id: 'send-button'
- waitForAnimationToEnd

# B-3: 验证发送后输入框清空但仍可见
- assertVisible:
    id: 'chat-message-input'

# B-4: 验证发送按钮仍可见（消息已发送，输入框清空）
- assertVisible:
    id: 'send-button'

# B-5: 验证 MessageBubble 已渲染（消息列表中存在已发送消息）
- assertVisible:
    id: 'chat-message-list'

# ── 场景 C: AttachmentPicker 交互 ───────────────────────────────────
- runFlow:
    when:
      visible:
        id: 'attachment-button'
    commands:
      # C-1: 打开附件选择器
      - tapOn:
          id: 'attachment-button'
      - waitForAnimationToEnd
      # C-2: 验证 modal 和按钮可见
      - extendedWaitUntil:
          visible:
            id: 'attachment-picker-modal'
          timeout: 5000
      - assertVisible:
          id: 'attachment-picker-modal'
      - assertVisible:
          id: 'pick-image-button'
      - assertVisible:
          id: 'pick-file-button'
      # C-3: 关闭附件选择器
      - tapOn:
          id: 'attachment-cancel-button'
      - waitForAnimationToEnd

# ── 场景 D: QuickReply 快捷回复交互 ─────────────────────────────────
# D-1: 如果存在快捷回复按钮，测试自定义快捷回复添加
- runFlow:
    when:
      visible:
        id: 'quick-reply-add-button'
    commands:
      - tapOn:
          id: 'quick-reply-add-button'
      - waitForAnimationToEnd
      - assertVisible:
          id: 'quick-reply-add-modal'
      - tapOn:
          id: 'quick-reply-add-input'
      - inputText: 'Maestro Quick Reply'
      - tapOn:
          id: 'quick-reply-add-confirm'
      - waitForAnimationToEnd
      # D-2: 选择刚添加的自定义快捷回复（应填入输入框）
      - runFlow:
          when:
            visible: 'Maestro Quick Reply'
          commands:
            - tapOn: 'Maestro Quick Reply'
            - waitForAnimationToEnd
            - assertVisible:
                id: 'chat-message-input'
            # D-3: 发送通过快捷回复填入的消息
            - tapOn:
                id: 'send-button'
            - waitForAnimationToEnd

# ── 场景 E: IdentitySwitcher 身份切换 ───────────────────────────────
- runFlow:
    when:
      visible:
        id: 'chat-identity-switcher-switch-button'
    commands:
      # E-1: 点击切换按钮
      - tapOn:
          id: 'chat-identity-switcher-switch-button'
      - waitForAnimationToEnd
      # E-2: 处理确认弹窗（点击"取消"避免影响后续测试）
      - runFlow:
          when:
            visible: '取消'
          commands:
            - tapOn: '取消'
            - waitForAnimationToEnd

# ── 最终断言: 仍在聊天界面，核心元素可见 ─────────────────────────────
- assertVisible:
    id: 'chat-identity-switcher'
- assertVisible:
    id: 'send-button'
- assertVisible:
    id: 'chat-message-input'
