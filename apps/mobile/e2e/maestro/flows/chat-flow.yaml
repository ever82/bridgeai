# issue: ISSUE-CHAT-001
# description: 消息列表和聊天发送接收交互（覆盖 ChatInput / AttachmentPicker / QuickReply / IdentitySwitcher / EmojiPicker）

appId: com.bridgeai.mobile
env:
  TEST_EMAIL: 'test-${TIMESTAMP}-${RANDOM}@bridgeai.test'
  TEST_PASSWORD: 'TestPass123!'
  TEST_MESSAGE: 'Maestro E2E test message ${TIMESTAMP}'

---
# 快速登录
- launchApp

# 等待登录表单
- extendedWaitUntil:
    visible:
      id: 'login-email-input'
    timeout: 30000

- tapOn:
    id: 'login-email-input'
- inputText: '${TEST_EMAIL}'
- tapOn:
    id: 'login-password-input'
- inputText: '${TEST_PASSWORD}'
- tapOn:
    id: 'login-button'
- waitForAnimationToEnd

# 等待首页
- extendedWaitUntil:
    visible:
      id: 'home-header'
    timeout: 30000

# 导航到消息 tab
- tapOn:
    label: 'messages-tab'
- waitForAnimationToEnd

# 断言1: 消息列表页面可见
- extendedWaitUntil:
    visible:
      id: 'messages-list'
    timeout: 10000
- assertVisible:
    id: 'messages-list'

# 断言2: 验证有会话项（点击第一个会话进入聊天）
- tapOn:
    index: 0
- waitForAnimationToEnd

# 断言3: 聊天界面身份切换器可见
- extendedWaitUntil:
    visible:
      id: 'chat-identity-switcher'
    timeout: 10000
- assertVisible:
    id: 'chat-identity-switcher'

# 断言4: 验证发送按钮可见
- assertVisible:
    id: 'send-button'

# 断言5: 验证输入框存在（通过 emoji 按钮确认输入区域可见）
- assertVisible:
    id: 'emoji-button'

# ── 场景 A: 使用 EmojiPicker 选择 emoji ─────────────────────────
# 打开 emoji 选择器
- tapOn:
    id: 'emoji-button'
- waitForAnimationToEnd

# 验证 emoji 搜索框可见（确认 picker 已展开）
- assertVisible:
    id: 'emoji-search-input'

# 选择常用分类（可选，默认已选中）
- runFlow:
    when:
      visible:
        id: 'emoji-category-常用'
    commands:
      - tapOn:
          id: 'emoji-category-常用'
      - waitForAnimationToEnd

# 关闭 emoji picker，回到输入状态
- tapOn:
    id: 'emoji-button'
- waitForAnimationToEnd

# ── 场景 B: 通过 ChatInput 输入并发送消息 ───────────────────────
# 输入消息文本（点击输入框区域 - 第一个可输入控件）
- tapOn:
    index: 0
- inputText: '${TEST_MESSAGE}'
- waitForAnimationToEnd

# 点击发送
- tapOn:
    id: 'send-button'
- waitForAnimationToEnd

# 断言6: 验证发送后输入框仍可见（消息已发送，输入框清空）
- assertVisible:
    id: 'send-button'

# ── 场景 C: 打开 AttachmentPicker（如果存在附件按钮）─────────────
- runFlow:
    when:
      visible:
        id: 'attachment-button'
    commands:
      - tapOn:
          id: 'attachment-button'
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible:
            id: 'attachment-picker-modal'
          timeout: 5000
      - assertVisible:
          id: 'attachment-picker-modal'
      - assertVisible:
          id: 'pick-image-button'
      - assertVisible:
          id: 'pick-file-button'
      # 关闭附件选择器
      - tapOn:
          id: 'attachment-cancel-button'
      - waitForAnimationToEnd

# ── 场景 D: 使用 QuickReply 快捷回复（如果存在）──────────────────
- runFlow:
    when:
      visible:
        id: 'quick-reply-add-button'
    commands:
      # 打开自定义快捷回复对话框
      - tapOn:
          id: 'quick-reply-add-button'
      - waitForAnimationToEnd
      - assertVisible:
          id: 'quick-reply-add-modal'
      - tapOn:
          id: 'quick-reply-add-input'
      - inputText: 'Maestro Quick Reply'
      - tapOn:
          id: 'quick-reply-add-confirm'
      - waitForAnimationToEnd

# ── 场景 E: 切换身份 (IdentitySwitcher) ────────────────────────
- runFlow:
    when:
      visible:
        id: 'chat-identity-switcher-switch-button'
    commands:
      - tapOn:
          id: 'chat-identity-switcher-switch-button'
      - waitForAnimationToEnd
      # 处理确认弹窗（点击"取消"避免影响后续测试，验证弹窗确实出现过）
      - runFlow:
          when:
            visible: '取消'
          commands:
            - tapOn: '取消'
            - waitForAnimationToEnd

# 最终断言: 仍在聊天界面，身份切换器可见
- assertVisible:
    id: 'chat-identity-switcher'
- assertVisible:
    id: 'send-button'
