# issue: ISSUE-CHAT-001
# description: 消息列表和聊天交互

appId: com.bridgeai.mobile
env:
  TEST_EMAIL: 'test@bridgeai.test'
  TEST_PASSWORD: 'TestPass123!'
  TEST_MESSAGE: 'Maestro E2E test ${TIMESTAMP}'

---
# 快速登录
- launchApp
- waitForAnimationToEnd

# 额外等待 App 初始化完成
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# 等待登录表单
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 20000

- tapOn:
    id: "login-email-input"
- inputText: '${TEST_EMAIL}'
- tapOn:
    id: "login-password-input"
- inputText: '${TEST_PASSWORD}'
- tapOn:
    id: "login-button"
- waitForAnimationToEnd

# 等待首页
- extendedWaitUntil:
    visible:
      id: "home-header"
    timeout: 30000

# 导航到消息 tab
- tapOn:
    label: "messages-tab"
- waitForAnimationToEnd

# 验证消息列表
- extendedWaitUntil:
    visible:
      id: "messages-list"
    timeout: 10000
- assertVisible:
    id: "messages-list"