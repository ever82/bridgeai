# Redis Persistence Configuration for BridgeAI
# Usage: redis-server /path/to/redis.conf
# Or for Docker: docker run -v /path/to/redis.conf:/usr/local/etc/redis/redis.conf redis redis-server /usr/local/etc/redis/redis.conf

# Network
bind 127.0.0.1
port 6379
timeout 300

# Persistence - RDB (Snapshotting)
# Save every 15 minutes if at least 1 key changed
save 900 1
# Save every 5 minutes if at least 100 keys changed
save 300 100
# Save every 1 minute if at least 10000 keys changed
save 60 10000

# Persistence - AOF (Append Only File)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
# appendfsync always  # Safer but slower (blocks writes)
# appendfsync no      # Fastest but may lose up to 1 second of data

# AOF rewrite
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Security (production - uncomment and set password)
# requirepass your_redis_password_here

# Logging
loglevel notice
logfile ""

# Persistence check on restart
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
